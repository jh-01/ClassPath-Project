version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto17
    commands:
      - echo 🔧 Installing dependencies...
      - ./gradlew clean

  build:
    commands:
      - echo 🛠 Building the project...
      - ./gradlew build -x test

artifacts:
  files:
    - build/libs/*.jar
    - appspec.yml
    - scripts/**/*
