spring.application.name=ClassPath

# =============================
# Database Configuration
# =============================
spring.datasource.url=jdbc:mysql://${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# DataSource Configuration
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# =============================
# JPA & Hibernate
# =============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# =============================
# JWT (?? ??)
# =============================

jwt.secret=${JWT_SECRET:ThisIsASecureJwtSecretKeyWithAtLeast32Bytes}
jwt.expiration=${JWT_EXPIRATION:3600000}

# ??? ?? ??
spring.messages.basename=validation


# ==============================
# Redis
# ==============================
spring.data.redis.host=redis
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# ?? ? ?? (Lettuce ?? ? ???)
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0
spring.data.redis.lettuce.pool.max-wait=5000

# Connection Pool Settings
spring.datasource.hikari.pool-name=ClassPathHikariCP
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1